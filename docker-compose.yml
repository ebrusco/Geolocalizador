services:
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prospectoai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql

volumes:
  pgdata:
